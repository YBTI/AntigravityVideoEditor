<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>External Preview</title>
  <style>
    body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; display: flex; justify-content: center; align-items: center; }
    #ext-canvas { width: 100vw; height: 100vh; object-fit: contain; }
  </style>
</head>
<body>
  <canvas id="ext-canvas" width="1280" height="720"></canvas>
  <script>
    const { ipcRenderer } = require('electron');
    const canvas = document.getElementById('ext-canvas');
    const ctx = canvas.getContext('2d');
    
    ipcRenderer.on('render-frame', (event, dataUrl) => {
      const img = new Image();
      img.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      };
      img.src = dataUrl;
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        ipcRenderer.send('close-external-window');
      }
    });
  </script>
</body>
</html>
